name: Parser CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  parser-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test:parsers
      - run: npm run check:fixtures
